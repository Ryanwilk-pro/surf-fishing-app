<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url('/public/static/fish.jpg');
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        nav {
            background-color: #007bff;
            padding: 10px;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
        }
        .content {
            flex: 1;
            padding: 20px;
            background-color: transparent;
            margin: 20px;
        }
        .content h1 {
            text-align: center;
            margin: 0;
            font-size: 100px;
            color: #000000;
        }
        #weather {
            position: absolute;
            top: 50px;
            right: 20px;
            text-align: right;
            color: white; /* Changed to white for better contrast on blue */
            background-color: rgba(0, 123, 255, 0.4); /* Blue with 80% opacity */
            padding: 10px; /* Adds space around the text */
            border-radius: 5px; /* Optional: rounds the corners for a nicer look */
        }
        footer {
            position: absolute;
            bottom: 10px;
            right: 10px;
        }
        footer button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 0;
        }
        footer button:hover {
            text-decoration: underline;
            color: #007bff;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/">Dashboard</a>
        <a href="/calendar">Calendar</a>
        <a href="/catch">Log a Catch</a>
    </nav>
    <div class="content">
        <div id="weather">
            <h2>Current Weather and Tide</h2>
            <h4 id="temperature"></h4>
            <h4 id="condition"></h4>
            <h4 id="humidity"></h4>
            <h4 id="tide"></h4>
        </div>
    </div>
    <footer>
        <form method="POST" action="/logout">
            <button type="submit">Log Out</button>
        </form>
    </footer>
    <script>
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(position => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                fetch(`/weather?lat=${lat}&lon=${lon}`)
                    .then(response => response.json())
                    .then(data => {
                        if (!data.error) {
                            document.getElementById('temperature').textContent = `Temperature: ${data.main.temp} °F`;
                            document.getElementById('condition').textContent = `Condition: ${data.weather[0].description}`;
                            document.getElementById('humidity').textContent = `Humidity: ${data.main.humidity}%`;
                            document.getElementById('tide').textContent = `Tide Level: ${data.tide_level || 'Unavailable'}`;
                        } else {
                            document.getElementById('weather').innerHTML = '<h2>Weather and tide data unavailable</h2>';
                        }
                    })
                    .catch(() => {
                        document.getElementById('weather').innerHTML = '<h2>Error fetching weather and tide data</h2>';
                    });
            }, () => {
                document.getElementById('weather').innerHTML = '<h2>Geolocation not supported or denied</h2>';
            });
        }
    </script>
</body>
</html>
